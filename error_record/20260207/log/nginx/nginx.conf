worker_process 1;

events {
    worker_connections 1024;
}

http{
    include   mime.types;
    default_type application/octet-stream;
    sendfile  on;
    keepalive_timeout   65;

    gzip    on;
    gzip_min_length     1k;
    gzip_buffers    4 16k;
    gzip_http_version   1.1;
    gzip_comp_level     2;
    gzip_types gzip_types   text/plain  text/css    application/json    application/javascript  text/xml    application/xml application/xml+rss text/javascript;
    gzip_proxied    any;

    log_format  lb_log
    '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" '
    'upstream_addr=$upstream_addr '
    'upstream_status=$upstream_status '
    'request_time=$request_time '
    'upstream_response_time=$upstream_response_time';

    upstream admin_backend {
    server DPAPHKLAPP01:9600 max_fails=3 fail_timeout=30s max_conns=100;
    ## server 10.41.242.157:9600 max_fails=3 fail_timeout=30s max_conns=100;
    }
}

server{
    listen 9080;
    server_name $hostname;

    location / {
        root    /opt/project/PAP/pap-front/idst/
        index   index.html index.htm;
        typ_files $uri  $uri/ /index.html;
    }

    location /saml2/ {
        proxy_pass http://admin_backend/saml2/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header REMOTE-HOST $remote_addr
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-forwarded-Host $host;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_real_timeout 30s;
        proxy_buffering off;

        access_log /opt/project/PAP/nginx/logs/admin-api-access.log lb_log;
    }

    location /login/saml2/ {
        proxy_pass http://admin_backend/login/saml2/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header REMOTE-HOST $remote_addr
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-forwarded-Host $host;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_real_timeout 30s;
        proxy_buffering off;

        access_log /opt/project/PAP/nginx/logs/admin-api-access.log lb_log;
    }

    location /admin-api/ {
        proxy_pass  http://admin_backend/admin-api/;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header REMOTE-HOST $remote_addr
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-forwarded-Host $host;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_real_timeout 30s;
        proxy_buffering off;

        access_log /opt/project/PAP/nginx/logs/admin-api-access.log lb_log;

    }
}