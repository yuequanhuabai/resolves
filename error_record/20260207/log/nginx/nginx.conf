worker_process 1;

events {
    worker_connections 1024;
}

http{
    include   mime.types;
    default_type application/octet-stream;
    sendfile  on;
    keepalive_timeout   65;

    gzip    on;
    gzip_min_length     1k;
    gzip_buffers    4 16k;
    gzip_http_version   1.1;
    gzip_comp_level     2;
    gzip_types gzip_types   text/plain  text/css    application/json    application/javascript  text/xml    application/xml application/xml+rss text/javascript;
    gzip_proxied    any;

    log_format  lb_log
    '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" '
    'upstream_addr=$upstream_addr '
    'upstream_status=$upstream_status '
    'request_time=$request_time '
    'upstream_response_time=$upstream_response_time';

    upstream admin_backend {
    server DPAPHKLAPP01:9600 max_fails=3 fail_timeout=30s max_conns=100;
    ## server 10.41.242.157:9600 max_fails=3 fail_timeout=30s max_conns=100;
    }
}

server{
    listen 9080;
    server_name $hostname;

    location / {
        root    /opt/project/PAP/pap-front/idst/
        index   index.html index.htm;
        typ_files $uri  $uri/ /index.html;
    }
}