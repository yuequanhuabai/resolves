bind 0.0.0.0
port 6379

protected-mode no

daemonize no

supervised systemd

pidfile /opt/project/PAP/redis/logs/redis.pid
logfile /opt/project/PAP/redis/logs/redis.log
dir /opt/project/PAP/redis/data

save 900

appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

maxmemory 4gb
maxmemory-policy allkeys-lru

loglevel notice




