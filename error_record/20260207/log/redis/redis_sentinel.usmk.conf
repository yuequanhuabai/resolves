bind 0.0.0.0
port 9379

protected-mode no
daemonize no
supervised systemd

pidfile /opt/project/PAP/redis/logs/redis_sentinel.pid
logfile /opt/project/PAP/redis/logs/redis_sentinel.log
dir /opt/project/PAP/redis/data


sentinel resolve-hostname yes
sentinel announce-hostnames yes
sentinel monitor mymaster upaphklapp03 6379 2
sentinel down-after-milliseconds mymaster 5000
sentinel failover-timeout mymaster 60000
sentinel parallel-syncs mymaster 1





