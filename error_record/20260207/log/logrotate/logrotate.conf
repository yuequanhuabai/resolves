#  PAP 应用日志（logback 写入的分级日志文件）
/opt/project/PAP/IHUB/back-end/logs/IHUB_*.log {
    daily
    rotate 2
    missingok
    notifempty
    dateext
    dateformat -%Y%m%d
    nocompress
    copytruncate
    sharedscripts
    postrotate

        HOSTNAME=$(hostname)
        MODULE="IHUB-PAP"
        DATETIME=$(date +\%Y\%m\%d)
        ARCHIVE_DIR="/LOG"
        LOG_DIR="/opt/project/PAP/IHUB/back-end/logs"
        ROTATED_FILES=$(find ${LOG_DIR} -name "IHUB_*.log-${DATETIME}" 2>/dev/null)

        if [ -n "${ROTATED_FILES}" ]; then
            tar -czf "${ARCHIVE_DIR}/${HOSTNAME}.${MODULE}.applog.${DATETIME}.tar.gz" -C ${LOG_DIR} $(for f in ${ROTATED_FILES}; do basename "$f"; done)
        fi
    endscript
}